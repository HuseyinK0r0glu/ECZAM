name: frontend

on:
  push:
    branches: [master, main]
    paths: ["frontend/**", ".github/workflows/frontend.yml"]
  pull_request:
    paths: ["frontend/**", ".github/workflows/frontend.yml"]

defaults:
  run:
    working-directory: frontend

jobs:
  analyze-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Generated localizations (lib/l10n -> AppLocalizations) are produced by pub get,
      # but run gen-l10n explicitly so analyze never trips on a missing import.
      - name: Generate localizations
        run: flutter gen-l10n || true

      - name: Static analysis
        run: flutter analyze

      - name: Unit & widget tests
        run: flutter test --coverage --reporter expanded

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-lcov
          path: frontend/coverage/lcov.info
          if-no-files-found: ignore

      - name: Build debug APK (smoke)
        run: flutter build apk --debug --dart-define=API_BASE_URL=http://10.0.2.2:8080/api/v1
