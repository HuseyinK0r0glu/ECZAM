name: backend

on:
  push:
    branches: [master, main]
    paths: ["backend/**", ".github/workflows/backend.yml"]
  pull_request:
    paths: ["backend/**", ".github/workflows/backend.yml"]

defaults:
  run:
    working-directory: backend

jobs:
  build-test:
    runs-on: ubuntu-latest
    # Testcontainers spins up Postgres/pgvector via the runner's Docker daemon.
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      # mvnw bootstraps its wrapper jar from maven-wrapper.properties on first run.
      - name: Build, test (Testcontainers) and verify
        run: ./mvnw -B -ntp verify

      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: backend/target/site/jacoco/
          if-no-files-found: ignore

      - name: Upload jar
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: eczam-backend-jar
          path: backend/target/*.jar
          if-no-files-found: ignore
