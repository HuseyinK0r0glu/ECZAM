version: 2
updates:
  # Backend (Maven)
  - package-ecosystem: maven
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      spring:
        patterns: ["org.springframework*"]

  # Frontend (Flutter / pub)
  - package-ecosystem: pub
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # CI workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
