# Test-only overrides (loaded on top of the main application.yml).
# Effectively disable rate limiting for the shared integration-test context so
# normal /auth and /ai calls across test classes never trip the limiter.
# RateLimitIntegrationTest re-enables a low limit via @TestPropertySource.
eczam.ratelimit.auth-per-minute=1000000
eczam.ratelimit.ai-per-minute=1000000
